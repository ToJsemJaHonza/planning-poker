# Planning Poker — CI/CD Pipeline
#
# Flow:
#   - PR opened/updated         → test + lint + build (gate before merge)
#   - Push to master            → test + lint + build + GitHub Pages deploy
#
# Triggers are scoped so a same-repo PR runs once (pull_request only); only
# master pushes also fire a push run. The `test` and `lint` job names are
# stable so they can be required status checks in branch protection.

name: CI / CD

on:
  push:
    branches: [master]
  pull_request:

# Pages deploy is serialised per ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. TEST — runs on every PR & master push. Required gate.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --reporter=default --reporter=junit --outputFile=test-results.junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results.junit.xml
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 2. LINT — parallel to test. Cheap gate against ESLint regressions.
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # 3. BUILD — runs on PRs and master pushes. Produces the Pages artifact
  #    on master; PR builds verify the build succeeds without deploying.
  # ---------------------------------------------------------------------------
  build:
    name: build
    needs: [test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # Master only — Pages deploy consumes this.
      - uses: actions/configure-pages@v6
        if: github.event_name == 'push'

      - uses: actions/upload-pages-artifact@v5.0.0
        if: github.event_name == 'push'
        with:
          path: dist

  # ---------------------------------------------------------------------------
  # 4. DEPLOY — master-only GH Pages publish. Fails closed: any upstream
  #    failure (test, lint, build) skips deploy entirely.
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    needs: [test, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
