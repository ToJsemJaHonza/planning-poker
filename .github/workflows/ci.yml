# Planning Poker — CI/CD Pipeline
#
# Flow:
#   - PR or push to any branch  → `test` job runs (gate).
#   - Push to master            → `test` → `build` → `deploy` (GitHub Pages).
#
# The `test` job name is stable ("test") so it can be used as a required
# status check in GitHub branch protection rules.

name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Only one deploy to Pages at a time; in-progress deploys are cancelled.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. TEST — runs on every push & PR. Required gate before build/deploy.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --reporter=default --reporter=junit --outputFile=test-results.junit.xml

      # On failure (or always, so users can inspect green runs too), upload
      # the junit report as an artifact for post-mortem.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.junit.xml
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 2. BUILD — only after tests pass. Produces the Pages artifact.
  #    Only runs on pushes to master (not PRs, not feature branches).
  # ---------------------------------------------------------------------------
  build:
    name: build
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ---------------------------------------------------------------------------
  # 3. DEPLOY — publishes the Pages artifact produced by `build`.
  #    Depends on BOTH test and build. Fails closed: if either fails,
  #    deploy never runs.
  # ---------------------------------------------------------------------------
  deploy:
    name: deploy
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
